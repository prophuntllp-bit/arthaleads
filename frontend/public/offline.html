<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Arthaleads</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #111113;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 24px;
      text-align: center;
    }
    img { width: 80px; height: 80px; border-radius: 20px; }
    h1 { font-size: 1.5rem; font-weight: 700; }
    p  { font-size: 0.95rem; color: rgba(255,255,255,0.55); max-width: 300px; line-height: 1.6; }
    button {
      margin-top: 8px;
      padding: 12px 28px;
      border-radius: 10px;
      border: none;
      background: #f97316;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #ea6d10; }
  </style>
</head>
<body>
  <img src="/icons/icon-192x192.png" alt="Arthaleads" />
  <h1>You're offline</h1>
  <p>Check your internet connection and try again. Your data will sync automatically when you reconnect.</p>
  <button onclick="location.reload()">Try Again</button>
</body>
</html>
