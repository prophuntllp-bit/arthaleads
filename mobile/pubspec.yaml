name: arthaleads_mobile
description: "Arthaleads CRM — native Android app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  provider: ^6.1.2
  intl: ^0.20.0
  url_launcher: ^6.3.1
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^18.0.1
  google_sign_in: ^6.2.2
  just_audio: ^0.9.40
  pdf: ^3.11.1
  printing: ^5.13.4
  image_picker: ^1.1.2
  geolocator: ^13.0.1
  share_plus: ^10.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/images/

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#ff6b00"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
