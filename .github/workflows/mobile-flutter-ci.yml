name: Flutter Mobile CI

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-flutter-ci.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Analyze
        working-directory: mobile
        run: flutter analyze

      - name: Build debug APK
        working-directory: mobile
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: arthaleads-mobile-debug-apk
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      # ── Signed release build (only when the keystore secret is present) ────────
      # Uses the standard Flutter key.properties file (read by
      # mobile/android/app/build.gradle.kts) rather than Gradle -P flags, since
      # `flutter build` doesn't reliably forward arbitrary -P properties.
      - name: Write release signing config
        id: keystore
        working-directory: mobile
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > android/release.keystore
            {
              echo "storePassword=$STORE_PASSWORD"
              echo "keyPassword=$KEY_PASSWORD"
              echo "keyAlias=$KEY_ALIAS"
              echo "storeFile=release.keystore"
            } > android/key.properties
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "No MOBILE_KEYSTORE_BASE64 secret — skipping signed release build"
          fi
        env:
          KEYSTORE_B64: ${{ secrets.MOBILE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.MOBILE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.MOBILE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.MOBILE_KEY_PASSWORD }}

      - name: Build signed release APK + AAB
        if: steps.keystore.outputs.available == 'true'
        working-directory: mobile
        run: |
          flutter build apk --release
          flutter build appbundle --release

      - name: Upload signed release APK
        if: steps.keystore.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: arthaleads-mobile-release-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload release AAB (Play Store bundle)
        if: steps.keystore.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: arthaleads-mobile-release-aab
          path: mobile/build/app/outputs/bundle/release/app-release.aab
          retention-days: 30
