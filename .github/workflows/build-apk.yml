name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build web app
        working-directory: frontend
        run: npm run build

      - name: Inject google-services.json
        working-directory: frontend/android/app
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > google-services.json
            echo "google-services.json injected — FCM push notifications enabled"
          else
            echo "WARNING: GOOGLE_SERVICES_JSON secret not set — push notifications will NOT work"
          fi
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Sync Capacitor web assets + plugins
        working-directory: frontend
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x gradlew

      # ── Signed release build (when keystore secret is present) ─────────────────
      - name: Decode release keystore
        id: keystore
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > $HOME/release.keystore
            echo "available=true" >> $GITHUB_OUTPUT
            echo "Keystore decoded — building signed release APK + AAB"
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "No keystore — building debug APK only"
          fi
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build signed release APK + AAB (Play Store)
        if: steps.keystore.outputs.available == 'true'
        working-directory: frontend/android
        run: |
          ./gradlew assembleRelease bundleRelease \
            -Pandroid.injected.signing.store.file=$HOME/release.keystore \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ── Debug build (always runs — install directly on any Android phone) ──────
      - name: Build debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug

      # ── Upload artifacts ────────────────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: arthaleads-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload signed release APK
        if: steps.keystore.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: arthaleads-release-apk
          path: frontend/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload AAB (Play Store bundle)
        if: steps.keystore.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: arthaleads-release-aab
          path: frontend/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
